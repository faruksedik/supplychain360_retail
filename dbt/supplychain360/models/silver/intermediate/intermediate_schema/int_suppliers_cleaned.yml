version: 2

models:
  - name: int_suppliers_cleaned
    description: "Supplier metadata with standardized geography and categories."
    columns:
      - name: supplier_id
        tests:
          - unique
          - not_null
      - name: supplier_category
        description: "Uppercased category (e.g., ELECTRONICS) to prevent duplicates."
      - name: country_code
        description: "Standardized country reference."