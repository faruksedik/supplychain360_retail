version: 2

models:
  - name: int_store_locations_cleaned
    description: "Retail locations standardized for regional demand analysis."
    columns:
      - name: store_id
        tests:
          - unique
          - not_null
      - name: region_name
        description: "Standardized region (e.g., NORTH, SOUTH) for consistent filtering."
        tests:
          - not_null
      - name: store_open_date
        description: "The date the store opened, cast to DATE."