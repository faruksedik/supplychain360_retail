version: 2

models:
  - name: int_inventories_cleaned
    description: "Deduplicated daily inventory snapshots with out-of-stock risk flags."
    columns:
      - name: is_out_of_stock_risk
        description: "Binary flag (1/0) indicating if quantity is below threshold."
      - name: snapshot_date
        description: "The date of the inventory count, cast to DATE."