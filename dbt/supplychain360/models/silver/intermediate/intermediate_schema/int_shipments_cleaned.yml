version: 2

models:
  - name: int_shipments_cleaned
    description: "Cleaned logistics data with calculated delivery delays."
    columns:
      - name: shipment_id
        tests:
          - unique
          - not_null
      - name: delivery_delay_days
        description: "Difference between actual and expected delivery (Positive = Late)."
      - name: shipment_date
        description: "Explicitly cast to DATE type."