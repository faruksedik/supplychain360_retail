version: 2

models:
  - name: stg_inventories
    description: "Snapshot of stock levels at various warehouses."
    columns:
      - name: warehouse_id
        description: "Reference to the warehouse."
        tests:
          - not_null
          - relationships:
              to: ref('stg_warehouses')
              field: warehouse_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id
        description: "Reference to the product."
      - name: quantity_available
        description: "Current stock count at the time of snapshot."
      - name: reorder_threshold
        description: "The inventory level that triggers a new order."
      - name: snapshot_date
        description: "The date the inventory count was recorded."
      - name: ingested_at
        description: "Timestamp of ingestion."