version: 2

models:
  - name: stg_shipments
    description: "Logistics data for product movement between warehouses and stores."
    columns:
      - name: shipment_id
        description: "Primary key for shipments."
        tests:
          - unique
          - not_null
      - name: warehouse_id
        description: "Source warehouse for the shipment."
        tests:
          - relationships:
              to: ref('stg_warehouses')
              field: warehouse_id
      - name: store_id
        description: "Destination store for the shipment."
        tests:
          - relationships:
              to: ref('stg_store_locations')
              field: store_id
      - name: product_id
        description: "Product being moved."
        tests:
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: quantity_shipped
        description: "Number of units in the shipment."
      - name: shipment_date
        description: "Date the shipment left the warehouse."
      - name: expected_delivery_date
        description: "Target date for delivery."
      - name: actual_delivery_date
        description: "The date the store confirmed receipt."
      - name: carrier
        description: "Logistics company handling the transport."
      - name: ingested_at
        description: "Timestamp of ingestion."