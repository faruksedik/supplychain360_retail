version: 2

models:
  - name: stg_products
    description: "Master product catalog."
    columns:
      - name: product_id
        description: "Primary key for products."
        tests:
          - unique
          - not_null
      - name: supplier_id
        description: "Foreign key to stg_suppliers."
        tests:
          - not_null
          - relationships:
              to: ref('stg_suppliers')
              field: supplier_id
      - name: product_name
        description: "Full name of the product."
      - name: category
        description: "Product category (e.g., Perishables, Hardware)."
      - name: brand
        description: "The brand name associated with the product."
      - name: unit_price
        description: "The standard selling price per unit."
      - name: ingested_at
        description: "Timestamp of ingestion."