version: 2

models:
  - name: stg_sales
    description: "Point of sale transaction records."
    columns:
      - name: transaction_id
        description: "Primary key for sales transactions."
        tests:
          - unique
          - not_null
      - name: store_id
        description: "Reference to the store where the sale occurred."
        tests:
          - not_null
          - relationships:
              to: ref('stg_store_locations')
              field: store_id
      - name: product_id
        description: "Reference to the product sold."
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: quantity_sold
        description: "Number of units purchased."
      - name: unit_price
        description: "Price per unit at the time of sale."
      - name: discount_pct
        description: "Percentage discount applied to the sale."
      - name: sale_amount
        description: "Total value (Quantity * Price) - Discount."
      - name: transaction_timestamp
        description: "The exact date and time the sale was finalized."
      - name: ingested_at
        description: "Timestamp of ingestion."